name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    name: Build Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      - name: Sync package version from tag
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          npm version "$tag_version" --no-git-tag-version --allow-same-version
          if [[ "$tag_version" == *-* ]]; then
            echo "NPM_DIST_TAG=experimental" >> "$GITHUB_ENV"
          else
            echo "NPM_DIST_TAG=latest" >> "$GITHUB_ENV"
          fi

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Test
        run: make test

      - name: Vet
        run: make vet

      - name: Build distribution artifacts
        run: make dist VERSION="${GITHUB_REF_NAME}"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}

      - name: Check npm package contents
        run: npm pack --dry-run

      - name: Publish npm package
        run: npm publish --access public --tag "$NPM_DIST_TAG"
